<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>DAILY · Dumbbell Split</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;
    --panel:#141414;
    --panel2:#1c1c1c;
    --line:#2a2a2a;
    --txt:#f2f2f0;
    --dim:#7d7d78;
    --acc:#d6ff3f;
    --acc2:#ff5e3a;
    --done:#1f3a1a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);color:var(--txt);font-family:'Archivo',sans-serif;}
  body{
    min-height:100vh;
    padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 90px);
    background-image:radial-gradient(circle at 50% -10%, rgba(214,255,63,.06), transparent 60%);
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 18px;}

  header{padding:26px 0 14px;}
  .kick{font-family:'Archivo';font-size:11px;letter-spacing:.32em;color:var(--acc);font-weight:700;text-transform:uppercase;}
  h1{font-family:'Bebas Neue';font-size:54px;line-height:.9;letter-spacing:.01em;margin-top:4px;}
  .sub{color:var(--dim);font-size:13px;margin-top:8px;font-weight:500;}

  .days{display:flex;gap:7px;overflow-x:auto;padding:18px 0 6px;scrollbar-width:none;}
  .days::-webkit-scrollbar{display:none;}
  .day{
    flex:0 0 auto;min-width:46px;padding:10px 0;text-align:center;
    background:var(--panel);border:1px solid var(--line);border-radius:13px;
    font-weight:700;font-size:13px;color:var(--dim);transition:.15s;cursor:pointer;position:relative;
  }
  .day small{display:block;font-size:9px;letter-spacing:.12em;margin-top:3px;text-transform:uppercase;font-weight:600;opacity:.8;}
  .day.active{background:var(--acc);color:#0a0a0a;border-color:var(--acc);}
  .day .dot{position:absolute;top:6px;right:7px;width:6px;height:6px;border-radius:50%;background:transparent;}
  .day.complete .dot{background:var(--acc2);}
  .day.active.complete .dot{background:#0a0a0a;}

  .head2{display:flex;align-items:flex-end;justify-content:space-between;margin:22px 0 4px;}
  .focus{font-family:'Bebas Neue';font-size:38px;line-height:1;}
  .meta{font-size:12px;color:var(--dim);font-weight:600;text-align:right;}
  .meta b{color:var(--acc);}

  .prog{height:5px;background:var(--panel2);border-radius:5px;margin:14px 0 4px;overflow:hidden;}
  .prog i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .3s;}

  .ex{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px 16px 12px;margin-top:14px;}
  .ex.done{background:var(--done);border-color:#2c4a24;}
  .ex-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .ex-name{font-weight:700;font-size:17px;line-height:1.15;}
  .ex-scheme{color:var(--dim);font-size:12px;font-weight:600;margin-top:3px;letter-spacing:.02em;}
  .ex.done .ex-scheme{color:#8fc97f;}
  .sets{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px;}
  .set{
    width:42px;height:42px;border-radius:11px;background:var(--panel2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:var(--dim);
    cursor:pointer;transition:.12s;
  }
  .set.on{background:var(--acc);color:#0a0a0a;border-color:var(--acc);transform:scale(1.04);}

  .restbar{margin-top:30px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;text-align:center;}
  .restbar .lbl{font-size:11px;letter-spacing:.25em;color:var(--dim);text-transform:uppercase;font-weight:700;}
  .timer{font-family:'Bebas Neue';font-size:60px;line-height:1;margin:6px 0;letter-spacing:.02em;}
  .tbtns{display:flex;gap:8px;justify-content:center;}
  .tbtns button{
    flex:1;max-width:120px;padding:11px;border:none;border-radius:12px;font-family:'Archivo';
    font-weight:700;font-size:14px;cursor:pointer;background:var(--panel2);color:var(--txt);border:1px solid var(--line);
  }
  .tbtns button.go{background:var(--acc);color:#0a0a0a;border-color:var(--acc);}

  .note{color:var(--dim);font-size:12px;line-height:1.5;margin:20px 2px 0;font-weight:500;}
  .reset{margin:16px auto 0;display:block;background:none;border:1px solid var(--line);color:var(--dim);
    padding:9px 16px;border-radius:11px;font-family:'Archivo';font-weight:600;font-size:12px;cursor:pointer;}

  .foot{position:fixed;left:0;right:0;bottom:0;background:rgba(10,10,10,.92);
    backdrop-filter:blur(14px);border-top:1px solid var(--line);
    padding:13px 18px calc(13px + env(safe-area-inset-bottom));}
  .foot .wrap{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:0;}
  .streak{font-size:12px;color:var(--dim);font-weight:600;}
  .streak b{color:var(--acc);font-size:15px;}
  .finishbtn{background:var(--acc);color:#0a0a0a;border:none;padding:13px 22px;border-radius:13px;
    font-family:'Bebas Neue';font-size:20px;letter-spacing:.04em;cursor:pointer;}
  .finishbtn.dim{background:var(--panel2);color:var(--dim);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kick">7-Day · Dumbbell + Bench</div>
    <h1>DAILY GRIND</h1>
    <div class="sub">Low rep · heavy · 20–30 min · 1–2 reps in reserve</div>
  </header>

  <div class="days" id="days"></div>

  <div class="head2">
    <div class="focus" id="focus">—</div>
    <div class="meta" id="meta"></div>
  </div>
  <div class="prog"><i id="progbar"></i></div>

  <div id="list"></div>

  <div class="restbar">
    <div class="lbl">Rest Timer</div>
    <div class="timer" id="timer">1:00</div>
    <div class="tbtns">
      <button class="go" id="startT">Start 60s</button>
      <button id="add15">+15s</button>
      <button id="resetT">Reset</button>
    </div>
  </div>

  <div class="note" id="note"></div>
  <button class="reset" id="wipe">Reset today's checkmarks</button>
</div>

<div class="foot">
  <div class="wrap">
    <div class="streak">Days done this week<br><b id="streak">0</b> / 7</div>
    <button class="finishbtn dim" id="finish">MARK DONE</button>
  </div>
</div>

<script>
const PLAN = [
  {d:"MON", focus:"PUSH", time:"~25 min", ex:[
    {n:"Dumbbell Bench Press",s:"4 × 5"},
    {n:"Standing Overhead Press",s:"4 × 5"},
    {n:"Incline DB Press",s:"3 × 6"},
    {n:"Lateral Raise",s:"2 × 10"},
  ]},
  {d:"TUE", focus:"PULL", time:"~25 min", ex:[
    {n:"Single-Arm Row (bench)",s:"4 × 5 /arm"},
    {n:"DB Romanian Deadlift",s:"4 × 5"},
    {n:"Chest-Supported Row",s:"3 × 6"},
    {n:"DB Curl",s:"2 × 10"},
  ]},
  {d:"WED", focus:"LEGS", time:"~25 min", ex:[
    {n:"Bulgarian Split Squat",s:"4 × 5 /leg"},
    {n:"Goblet Squat",s:"4 × 6"},
    {n:"DB Romanian Deadlift",s:"3 × 6"},
    {n:"Calf Raise",s:"2 × 12"},
  ]},
  {d:"THU", focus:"MOBILITY", time:"~20 min", ex:[
    {n:"Goblet Squat (light)",s:"2 × 10"},
    {n:"DB Row (light)",s:"2 × 10"},
    {n:"Push-ups",s:"2 × submax"},
    {n:"Plank",s:"2 × 30s"},
  ]},
  {d:"FRI", focus:"PUSH", time:"~25 min", ex:[
    {n:"Standing Overhead Press",s:"4 × 5"},
    {n:"Dumbbell Bench Press",s:"4 × 5"},
    {n:"Arnold Press",s:"3 × 6"},
    {n:"Overhead Triceps Ext.",s:"2 × 10"},
  ]},
  {d:"SAT", focus:"PULL", time:"~25 min", ex:[
    {n:"DB Romanian Deadlift",s:"4 × 5"},
    {n:"Single-Arm Row (bench)",s:"4 × 5 /arm"},
    {n:"DB Shrug",s:"3 × 8"},
    {n:"Hammer Curl",s:"2 × 10"},
  ]},
  {d:"SUN", focus:"FULL BODY", time:"~22 min", ex:[
    {n:"Dumbbell Bench Press",s:"3 × 5"},
    {n:"Single-Arm Row (bench)",s:"3 × 5 /arm"},
    {n:"Bulgarian Split Squat",s:"3 × 5 /leg"},
    {n:"Standing Overhead Press",s:"3 × 5"},
  ]},
];

const NOTES = {
  MOBILITY:"Recovery day — keep it genuinely easy. If you're beat from the week, this is also your fallback for any day you can't fully recover for.",
  default:"Go heavy enough that rep 5 is hard, but leave 1–2 reps in the tank. Daily volume adds up — you can't grind to failure every session. Rest ~60–75s between sets."
};

// ---- state (in-memory; persists via localStorage when available) ----
let store = {};
try { store = JSON.parse(localStorage.getItem('dailygrind')||'{}'); } catch(e){ store = {}; }
function save(){ try{ localStorage.setItem('dailygrind', JSON.stringify(store)); }catch(e){} }

const todayIdx = (new Date().getDay()+6)%7; // Mon=0
let cur = todayIdx;

function setsFor(scheme){ const m=scheme.match(/^(\d+)/); return m?+m[1]:1; }
function key(di,ei){ return `d${di}_e${ei}`; }

function render(){
  // day pills
  const days = document.getElementById('days');
  days.innerHTML='';
  PLAN.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='day'+(i===cur?' active':'')+(store['done_'+i]?' complete':'');
    el.innerHTML=`${p.d}<small>${p.focus.split(' ')[0]}</small><span class="dot"></span>`;
    el.onclick=()=>{cur=i;render();};
    days.appendChild(el);
  });

  const p=PLAN[cur];
  document.getElementById('focus').textContent=p.focus;
  document.getElementById('meta').innerHTML=`${p.d} · ${p.ex.length} lifts<br><b>${p.time}</b>`;

  const list=document.getElementById('list');
  list.innerHTML='';
  let totalSets=0, doneSets=0;
  p.ex.forEach((e,ei)=>{
    const tot=setsFor(e.s); totalSets+=tot;
    const card=document.createElement('div'); card.className='ex';
    const setsHtml=[];
    let exDone=0;
    for(let s=0;s<tot;s++){
      const on=store[key(cur,ei)+'_s'+s];
      if(on){doneSets++;exDone++;}
      setsHtml.push(`<div class="set${on?' on':''}" data-e="${ei}" data-s="${s}">${s+1}</div>`);
    }
    if(exDone===tot) card.classList.add('done');
    card.innerHTML=`<div class="ex-top"><div><div class="ex-name">${e.n}</div><div class="ex-scheme">${e.s}</div></div></div><div class="sets">${setsHtml.join('')}</div>`;
    list.appendChild(card);
  });

  list.querySelectorAll('.set').forEach(b=>{
    b.onclick=()=>{
      const k=key(cur,b.dataset.e)+'_s'+b.dataset.s;
      store[k]=!store[k]; save(); render();
      if(navigator.vibrate) navigator.vibrate(8);
    };
  });

  document.getElementById('progbar').style.width=(totalSets?doneSets/totalSets*100:0)+'%';
  document.getElementById('note').textContent = NOTES[p.focus]||NOTES.default;

  // finish button + streak
  const allDone = totalSets>0 && doneSets===totalSets;
  const fb=document.getElementById('finish');
  if(store['done_'+cur]){ fb.textContent='✓ DONE'; fb.classList.remove('dim'); }
  else { fb.textContent='MARK DONE'; fb.classList.toggle('dim',!allDone); }
  let streak=0; for(let i=0;i<7;i++) if(store['done_'+i]) streak++;
  document.getElementById('streak').textContent=streak;
}

document.getElementById('finish').onclick=()=>{
  store['done_'+cur]=!store['done_'+cur]; save(); render();
  if(navigator.vibrate) navigator.vibrate([10,40,10]);
};
document.getElementById('wipe').onclick=()=>{
  const p=PLAN[cur];
  p.ex.forEach((e,ei)=>{for(let s=0;s<setsFor(e.s);s++) delete store[key(cur,ei)+'_s'+s];});
  delete store['done_'+cur]; save(); render();
};

// ---- rest timer ----
let tLeft=60, tInt=null;
const tEl=document.getElementById('timer');
function fmt(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function tick(){ tLeft--; tEl.textContent=fmt(Math.max(tLeft,0));
  if(tLeft<=0){clearInterval(tInt);tInt=null;tEl.style.color='var(--acc2)';
    if(navigator.vibrate)navigator.vibrate([20,60,20,60,20]);
    document.getElementById('startT').textContent='Start 60s';}
}
document.getElementById('startT').onclick=function(){
  if(tInt){clearInterval(tInt);tInt=null;this.textContent='Start 60s';return;}
  if(tLeft<=0)tLeft=60; tEl.style.color='';tEl.textContent=fmt(tLeft);
  tInt=setInterval(tick,1000); this.textContent='Pause';
};
document.getElementById('add15').onclick=()=>{tLeft+=15;tEl.style.color='';tEl.textContent=fmt(tLeft);};
document.getElementById('resetT').onclick=()=>{clearInterval(tInt);tInt=null;tLeft=60;tEl.style.color='';tEl.textContent='1:00';document.getElementById('startT').textContent='Start 60s';};

render();
</script>
</body>
</html>
